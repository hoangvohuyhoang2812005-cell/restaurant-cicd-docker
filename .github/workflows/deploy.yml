name: CI/CD Pipeline cho Restaurant Dashboard

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # TRẠM 1: KIỂM DUYỆT CODE (CI)
  # ==========================================
  ci-check:
    name: Kiểm tra mã nguồn (CI)
    runs-on: ubuntu-latest # Chạy trên server của GitHub

    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v3

      - name: Giả lập môi trường Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Cài đặt thư viện Frontend
        run: |
          cd frontend
          npm install

      - name: Chạy thử Build Frontend (Dry Build)
        run: |
          cd frontend
          npm run build
          echo "✅ Code Frontend hoàn toàn sạch sẽ, không có lỗi cú pháp!"

  # ==========================================
  # TRẠM 2: TRIỂN KHAI LÊN SERVER (CD)
  # ==========================================
  deploy:
    name: Triển khai lên Ubuntu (CD)
    needs: ci-check # LỆNH BẮT BUỘC: Chỉ chạy khi Trạm ci-check đã thành công
    runs-on: self-hosted # Chạy trên máy ảo của bạn

    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v3

      - name: Đóng gói và Khởi chạy Docker Compose
        run: |
          echo "==================================="
          echo " TRẠM CI ĐÃ PASS. BẮT ĐẦU DEPLOY!"
          echo "==================================="
          # Xóa các container cũ đang chiếm cổng (Phòng ngừa lỗi treo Creating)
          docker rm -f $(docker ps -aq) || true
          # Build và bật hệ thống mới
          docker compose down
          docker compose up -d --build
          echo "==================================="
          echo " TRIỂN KHAI THÀNH CÔNG!"
          echo "==================================="